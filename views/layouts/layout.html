<!DOCTYPE html>
<html lang="en" class="govuk-template--rebranded">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0c0c">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    
    <link rel="stylesheet" href="/css/govuk-frontend.min.css">
    <link rel="stylesheet" href="/css/site.css">
    
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
    <link rel="mask-icon" href="/images/govuk-mask-icon.svg" color="#0b0c0c">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/govuk-apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/images/govuk-apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/govuk-apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/images/govuk-apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" href="/images/govuk-apple-touch-icon.png">
    <link rel="icon" sizes="16x16" href="/images/govuk-favicon-16x16.png">
    <link rel="icon" sizes="32x32" href="/images/govuk-favicon-32x32.png">
    <link rel="icon" sizes="48x48" href="/images/govuk-favicon-48x48.png">
    <link rel="icon" sizes="57x57" href="/images/govuk-favicon-57x57.png">
    <link rel="icon" sizes="72x72" href="/images/govuk-favicon-72x72.png">
    <link rel="icon" sizes="114x114" href="/images/govuk-favicon-114x114.png">
    <link rel="icon" sizes="144x144" href="/images/govuk-favicon-144x144.png">
    <link rel="icon" sizes="195x195" href="/images/govuk-favicon-195x195.png">
    <link rel="icon" sizes="228x228" href="/images/govuk-favicon-228x228.png">
    
    
    {% block head %}{% endblock %} 
</head>

<body class="govuk-template__body">
  <a href="#main-content" class="govuk-skip-link">Skip to main content</a>

  {% include "partials/_header.html" %}
  {% include "partials/_servicenav.html" %}


  {% block beforeContent %}{% endblock %}

  <div class="govuk-width-container">
    <main class="govuk-main-wrapper" id="main-content" role="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% include "partials/_footer.html" %}

  <script type="module" src="/js/govuk-frontend.min.js"></script>
  <script type="module">
    import {
      initAll
    } from '/js/govuk-frontend.min.js'
    initAll()
  </script>

</body>
</html>
